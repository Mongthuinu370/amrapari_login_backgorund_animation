<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Animation</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            /* Subtle light-colored moving gradient */
            background: linear-gradient(-45deg, #ffffff, #f0f0f0, #e8e8e8, #ffffff);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        canvas {
            display: block;
            background: transparent;
        }
    </style>
</head>

<body>
    <canvas id="network"></canvas>
</body>

<script>
    const canvas = document.getElementById('network');
    const ctx = canvas.getContext('2d');
    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;

    const points = [];
    const pointCount = 130;
    let mouse = { x: -1000, y: -1000 };
    const connectionProgress = {};

    // Custom Color: rgb(68, 70, 152)
    const lineColor = "68, 70, 152";

    for (let i = 0; i < pointCount; i++) {
        points.push({
            x: Math.random() * width,
            y: Math.random() * height,
            vx: (Math.random() - 0.5) * 0.8,
            vy: (Math.random() - 0.5) * 0.8
        });
    }

    function drawGlow() {
        const glowRadius = 250;
        const gradient = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, glowRadius);
        // Glow also uses the custom color at very low opacity
        gradient.addColorStop(0, `rgba(${lineColor}, 0.08)`);
        gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, width, height);
    }

    function animate() {
        ctx.clearRect(0, 0, width, height);
        drawGlow();

        points.forEach(p => {
            p.x += p.vx;
            p.y += p.vy;
            if (p.x < 0 || p.x > width) p.vx *= -1;
            if (p.y < 0 || p.y > height) p.vy *= -1;

            let dist = Math.sqrt((p.x - mouse.x) ** 2 + (p.y - mouse.y) ** 2);
            if (dist < 220) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
                // Points use the new color
                ctx.fillStyle = `rgba(${lineColor}, ${1 - dist / 220})`;
                ctx.fill();
            }
        });

        for (let i = 0; i < pointCount; i++) {
            for (let j = i + 1; j < pointCount; j++) {
                const p1 = points[i];
                const p2 = points[j];
                const dx = p1.x - p2.x;
                const dy = p1.y - p2.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < 85) {
                    const key = `${i}-${j}`;
                    const mDist1 = Math.sqrt((p1.x - mouse.x) ** 2 + (p1.y - mouse.y) ** 2);
                    const mDist2 = Math.sqrt((p2.x - mouse.x) ** 2 + (p2.y - mouse.y) ** 2);

                    if (connectionProgress[key] === undefined) connectionProgress[key] = 0;

                    if (mDist1 < 220 && mDist2 < 220) {
                        connectionProgress[key] = Math.min(1, connectionProgress[key] + 0.15);
                    } else {
                        connectionProgress[key] = Math.max(0, connectionProgress[key] - 0.1);
                    }

                    const progress = connectionProgress[key];

                    if (progress > 0) {
                        const targetX = p1.x + (p2.x - p1.x) * progress;
                        const targetY = p1.y + (p2.y - p1.y) * progress;

                        ctx.beginPath();
                        // Lines use the new color: rgb(68, 70, 152)
                        ctx.strokeStyle = `rgba(${lineColor}, ${(1 - distance / 85) * progress})`;
                        ctx.lineWidth = 1;
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(targetX, targetY);
                        ctx.stroke();
                    }
                }
            }
        }
        requestAnimationFrame(animate);
    }

    window.addEventListener('mousemove', (e) => {
        mouse.x = e.clientX; mouse.y = e.clientY;
    });

    window.addEventListener('resize', () => {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    });

    animate();

</script>

</html>
